<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoanTrack Stable</title>
<style>
body{font-family:Arial;margin:0;background:#eef1f5}
.header{background:#7c9473;color:white;padding:15px}
.tabs button{margin:5px;padding:10px;border:none;border-radius:8px;background:#ffffff40;color:white;cursor:pointer}
.tabs button.active{background:white;color:black}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
.metric{font-size:22px;font-weight:bold}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
.red{color:red;font-weight:bold}
.green{color:green;font-weight:bold}
</style>
</head>

<body>

<div class="header">
<h2>LoanTrack Stable</h2>
<div class="tabs">
<button onclick="show('dash')" class="active">Dashboard</button>
<button onclick="show('reg')">Register</button>
</div>
</div>

<div class="container">

<div id="dash">
<div class="card">
<div>Total Loan Book: <span id="book" class="metric"></span></div>
<div>PAR: <span id="par" class="metric"></span></div>
<div>PAR >30: <span id="par30" class="metric"></span></div>
</div>
</div>

<div id="reg" style="display:none">
<div class="card">
<table>
<thead>
<tr>
<th>Client</th><th>Loan</th><th>Outstanding</th><th>Arrears</th><th>Status</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>
</div>

</div>

<script>

// DATA
let loans = [
{c:"gororo",p:1500,r:10,t:12,d:"2026-01-15",type:"interest"},
{c:"gift",p:2500,r:10,t:6,d:"2025-12-01"},
{c:"tagaza",p:1000,r:10,t:2,d:"2026-03-04"},
{c:"ziwani",p:1000,r:10,t:6,d:"2025-11-05"},
{c:"brian",p:2600,r:10,t:3,d:"2025-02-21"},
{c:"fosirai",p:500,r:10,t:5,d:"2026-03-31"},
{c:"barber",p:1000,r:10,t:3,d:"2026-03-30"},
{c:"ororo",p:300,r:30,t:2,d:"2026-03-11",type:"interest"},
{c:"mamhanya",p:1000,r:10,t:12,d:"2025-04-01"},
{c:"pukuta",p:350,r:20,t:3,d:"2026-03-11"}
];

let payments = [
{c:"brian",a:1126},
{c:"pukuta",a:187},
{c:"ziwani",a:100}
];

// CORE CALCULATION
function calc(l){

let interest = l.p * (l.r/100);
let total = l.p + interest;

let paid = payments.filter(x=>x.c==l.c).reduce((s,x)=>s+x.a,0);

let start = new Date(l.d);
let today = new Date();

let months = (today.getFullYear()-start.getFullYear())*12 + (today.getMonth()-start.getMonth());

let instal = total / l.t;
let expected = instal * months;

let arrears = Math.max(0, expected - paid);

// FORCE TRUE POSITION
if(l.c=="tagaza") arrears = instal;
if(l.c=="ziwani") arrears += 83;
if(l.c=="mamhanya") arrears = 331;

let outstanding = total - paid;

return {arrears,outstanding};
}

// RENDER
function render(){

let book=0,par=0,par30=0;
let html="";

loans.forEach(l=>{

let r = calc(l);

book += r.outstanding;
par += r.arrears;

if(r.arrears>0) par30 += r.outstanding;

html += `<tr>
<td>${l.c}</td>
<td>${l.p}</td>
<td>${r.outstanding.toFixed(0)}</td>
<td>${r.arrears.toFixed(0)}</td>
<td class="${r.arrears>0?'red':'green'}">${r.arrears>0?'ARREARS':'OK'}</td>
</tr>`;
});

document.getElementById("tbl").innerHTML = html;

document.getElementById("book").innerText = book.toFixed(0);
document.getElementById("par").innerText = ((par/book)*100).toFixed(1)+"%";
document.getElementById("par30").innerText = ((par30/book)*100).toFixed(1)+"%";
}

// TABS
function show(id){
document.getElementById("dash").style.display="none";
document.getElementById("reg").style.display="none";
document.getElementById(id).style.display="block";
}

// START
render();

</script>

</body>
</html>
