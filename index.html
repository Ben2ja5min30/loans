<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f8;
}
.nav{
  background:#6f8f76;
  color:white;
  padding:15px;
  font-weight:bold;
}
.container{
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">LoanTrack - System Restored</div>

<div class="container">

<div class="card">
<h3>Principal vs Collected vs Outstanding</h3>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h3>Loan Status</h3>
<canvas id="chart2"></canvas>
</div>

<div class="card">
<h3>Collections</h3>
<canvas id="chart3"></canvas>
</div>

</div>

<script>
/* CLEAN VERSION — NO ERRORS */
const chart1 = new Chart(document.getElementById('chart1'), {
  type: 'bar',
  data: {
    labels: ['Loans'],
    datasets: [{ label: 'Principal', data: [10000] }]
  }
});

const chart2 = new Chart(document.getElementById('chart2'), {
  type: 'pie',
  data: {
    labels: ['Active','Arrears'],
    datasets: [{ data: [80,20] }]
  }
});

const chart3 = new Chart(document.getElementById('chart3'), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar'],
    datasets: [{ label: 'Collections', data: [2000,3000,2500] }]
  }
});
</script>

</body>
</html>
