<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa;}
.nav { background:#1f3b64; color:white; padding:12px; }
.card { background:white; padding:15px; margin:10px; border-radius:8px; }
.grid { display:flex; gap:10px; flex-wrap:wrap; }
</style>
</head>

<body>

<div class="nav">LoanTrack - Multi User System</div>

<div class="grid">
<div class="card" id="totalPortfolio"></div>
<div class="card" id="totalCollected"></div>
<div class="card" id="arrears"></div>
<div class="card" id="outstanding"></div>
</div>

<script>
const SUPABASE_URL = "https://zutynzrniflbzbhaxdjj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ePmcLW2vzvojyCIZF9jrGA_GuxRsSQf";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadData() {
  try {

    const { data: loans } = await supabase.from('loans').select('*');
    const { data: payments } = await supabase.from('payments').select('*');

    if (!loans || !payments) throw "No data";

    let total = loans.reduce((a,b)=>a+Number(b.principal||0),0);
    let collected = payments.reduce((a,b)=>a+Number(b.amt_paid||0),0);
    let outstanding = total - collected;

    document.getElementById("totalPortfolio").innerHTML = "Total Portfolio: $" + total.toFixed(2);
    document.getElementById("totalCollected").innerHTML = "Collected: $" + collected.toFixed(2);
    document.getElementById("outstanding").innerHTML = "Outstanding: $" + outstanding.toFixed(2);

  } catch(e) {
    console.error(e);
    document.getElementById("totalPortfolio").innerHTML = "Supabase not available";
  }
}

loadData();
</script>

</body>
</html>
