<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f7f9;margin:0}
header{background:#6f8f7b;color:#fff;padding:15px}
nav button{margin:3px;padding:8px;border:none;border-radius:6px;background:#fff;cursor:pointer}
.tab{display:none;padding:10px}
.tab.active{display:block}
.card{background:#fff;padding:10px;margin:10px;border-radius:10px}
.btn{background:#6f8f7b;color:#fff;padding:8px;border:none;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px}
th{background:#6f8f7b;color:#fff}
</style>
</head>

<body>

<header>
<h2>LoanTrack</h2>
<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('register')">Register</button>
<button onclick="showTab('payments')">Payments</button>
<button onclick="showTab('structure')">Loan Structure</button>
</nav>
</header>

<div id="dashboard" class="tab active">
<div class="card">
<h3>Portfolio Summary</h3>
<div id="summary"></div>
</div>
</div>

<div id="register" class="tab">
<div class="card">
<input id="name" placeholder="Client Name"><br>
<input id="amount" type="number" placeholder="Loan Amount"><br>
<input id="date" type="date"><br>
<button class="btn" onclick="saveLoan()">Save Loan</button>
</div>
</div>

<div id="payments" class="tab">
<div class="card">
<input id="payId" placeholder="Loan ID"><br>
<input id="payAmount" type="number" placeholder="Amount"><br>
<input id="payDate" type="date"><br>
<button class="btn" onclick="savePayment()">Save Payment</button>
</div>
</div>

<div id="structure" class="tab">
<div class="card">
<h3>Loan Structure</h3>
<table>
<thead>
<tr>
<th>Client</th>
<th>Principal</th>
<th>Interest</th>
<th>Disbursed</th>
</tr>
</thead>
<tbody id="structureBody"></tbody>
</table>
</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://gxbtqgaminuvxknweuof.supabase.co",
"sb_publishable_2b49PfBI6NNMf84ftisnXA_sFR9lNAY"
);

let loans=[], payments=[];

function showTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

async function load(){
let l=await supabase.from("loans").select("*");
let p=await supabase.from("payments").select("*");
loans=l.data||[];
payments=p.data||[];
render();
}
load();

function render(){
document.getElementById("summary").innerHTML=
"Loans: "+loans.length+" | Payments: "+payments.length;

document.getElementById("structureBody").innerHTML=
loans.map(l=>`
<tr>
<td>${l.client_name}</td>
<td>${l.amount}</td>
<td>${l.amount*0.1}</td>
<td>${l.amount}</td>
</tr>`).join("");
}

async function saveLoan(){
await supabase.from("loans").insert([{
client_name:document.getElementById("name").value,
amount:Number(document.getElementById("amount").value),
disbursement_date:document.getElementById("date").value
}]);
load();
}

async function savePayment(){
await supabase.from("payments").insert([{
loan_id:document.getElementById("payId").value,
amount:Number(document.getElementById("payAmount").value),
payment_date:document.getElementById("payDate").value
}]);
load();
}
</script>

</body>
</html>
