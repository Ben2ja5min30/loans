<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack - Multi User System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; margin:0; background:#f5f7fa; }
.nav { background:#1f3b64; color:white; padding:14px 18px; font-size:18px; font-weight:700; }
.grid { display:flex; gap:12px; flex-wrap:wrap; padding:16px; }
.card { background:white; padding:16px; min-width:200px; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.label { color:#6b7280; font-size:12px; text-transform:uppercase; margin-bottom:6px; }
.value { font-size:32px; font-weight:700; color:#1f3b64; }
.msg { padding:16px; color:#b91c1c; font-weight:600; }
</style>
</head>

<body>
<div class="nav">LoanTrack - Multi User System</div>

<div class="grid">
  <div class="card"><div class="label">Total Portfolio</div><div class="value" id="totalPortfolio">...</div></div>
  <div class="card"><div class="label">Total Collected</div><div class="value" id="totalCollected">...</div></div>
  <div class="card"><div class="label">Outstanding</div><div class="value" id="outstanding">...</div></div>
  <div class="card"><div class="label">Loan Count</div><div class="value" id="loanCount">...</div></div>
</div>

<div id="message"></div>

<script>
const SUPABASE_URL = "https://zutynzrniflbzbhaxdjj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ePmcLW2vzvojyCIZF9jrGA_GuxRsSQf";

// IMPORTANT: do not name this variable `supabase`
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadData() {
  try {
    const { data: loans, error: loansError } = await supabaseClient.from('loans').select('*');
    const { data: payments, error: paymentsError } = await supabaseClient.from('payments').select('*');

    if (loansError) throw loansError;
    if (paymentsError) throw paymentsError;

    const totalPortfolio = (loans || []).reduce((a, b) => a + Number(b.amount || 0), 0);
    const totalCollected = (payments || []).reduce((a, b) => a + Number(b.amt_paid || 0), 0);
    const outstanding = totalPortfolio - totalCollected;
    const loanCount = (loans || []).length;

    document.getElementById("totalPortfolio").textContent = "$" + totalPortfolio.toFixed(2);
    document.getElementById("totalCollected").textContent = "$" + totalCollected.toFixed(2);
    document.getElementById("outstanding").textContent = "$" + outstanding.toFixed(2);
    document.getElementById("loanCount").textContent = String(loanCount);
    document.getElementById("message").innerHTML = "";
  } catch (e) {
    console.error("Supabase load error:", e);
    document.getElementById("message").innerHTML =
      '<div class="msg">Supabase connection failed. Check that the loans and payments tables exist in the zutynzrniflbzbhaxdjj project and match the expected columns.</div>';
  }
}

loadData();
</script>
</body>
</html>
